<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - Admin</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="admin-wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar(activo='clientes')}"></div>

    <div class="admin-content">
        <div class="admin-topbar">
            <div>
                <div class="admin-topbar-title">Gestión de Clientes</div>
                <div class="admin-topbar-sub">Cine La Estación</div>
            </div>
            <a href="/" class="btn-ver-sitio">Ver Sitio</a>
        </div>

        <div class="admin-main">
            <div class="row g-4">

                <div class="col-lg-4">
                    <div class="admin-card p-4">
                        <h6 class="fw-bold mb-3">Agregar Cliente</h6>
                        <form th:action="@{/admin/clientes/agregar}" th:object="${cliente}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Nombre</label>
                                <input type="text" th:field="*{nombre}" class="form-control" placeholder="Nombre completo" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" th:field="*{email}" class="form-control" placeholder="correo@ejemplo.com" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Teléfono</label>
                                <input type="text" th:field="*{telefono}" class="form-control" placeholder="08012345678">
                            </div>
                            <button type="submit" class="btn-admin-primary w-100">+ Guardar Cliente</button>
                        </form>
                    </div>
                </div>

                <div class="col-lg-8">
                    <div class="admin-card">
                        <div class="admin-card-header">
                            <div class="admin-card-title">Clientes Registrados</div>
                        </div>
                        <div class="table-responsive">
                            <table class="table table-bordered table-hover admin-table">
                                <thead class="table-dark">
                                    <tr>
                                        <th>ID</th>
                                        <th>Nombre</th>
                                        <th>Email</th>
                                        <th>Teléfono</th>
                                        <th>Reservas</th>
                                        <th>Total Gastado</th>
                                        <th>Acciones</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="c : ${clientes}">
                                        <td th:text="${c.id}"></td>
                                        <td class="fw-semibold" th:text="${c.nombre}"></td>
                                        <td th:text="${c.email}"></td>
                                        <td th:text="${c.telefono}"></td>
                                        <td th:text="${reservasPorCliente[c.id]}"></td>
                                        <td>$<span th:text="${gastadoPorCliente[c.id]}"></span></td>
                                        <td>
                                            <a th:href="@{/admin/clientes/eliminar/{id}(id=${c.id})}"
                                               class="btn btn-sm btn-outline-danger"
                                               onclick="return confirm('¿Eliminar?')">Eliminar</a>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(clientes)}">
                                        <td colspan="7" class="text-center text-muted py-3">Sin clientes registrados.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="col-12">
                    <div class="admin-card p-4">
                        <h6 class="fw-bold mb-3">Reservas por Cliente</h6>
                        <div class="mb-3">
                            <label class="form-label">Seleccionar Cliente</label>
                            <select id="filtroCliente" class="form-select" style="max-width:300px;" onchange="filtrarReservas()">
                                <option value="">-- Todos los clientes --</option>
                                <option th:each="c : ${clientes}"
                                        th:value="${c.id}"
                                        th:text="${c.nombre}"></option>
                            </select>
                        </div>
                        <div class="table-responsive">
                            <table class="table table-bordered table-striped" id="tablaReservasCliente">
                                <thead class="table-dark">
                                    <tr>
                                        <th>ID</th>
                                        <th>Cliente</th>
                                        <th>Email</th>
                                        <th>Película</th>
                                        <th>Género</th>
                                        <th>Fecha</th>
                                        <th>Asientos</th>
                                        <th>Total</th>
                                        <th>Estado</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="r : ${reservasDTO}"
                                        th:attr="data-cliente-id=${r.clienteId}">
                                        <td th:text="${r.id}"></td>
                                        <td th:text="${r.clienteNombre}"></td>
                                        <td th:text="${r.clienteEmail}"></td>
                                        <td th:text="${r.peliculaTitulo}"></td>
                                        <td th:text="${r.peliculaGenero}"></td>
                                        <td th:text="${r.fecha}"></td>
                                        <td th:text="${r.asientos}"></td>
                                        <td>$<span th:text="${r.total}"></span></td>
                                        <td>
                                            <span th:text="${r.estado}"
                                                  th:class="${r.estado == 'Confirmada'} ? 'badge bg-success' : (${r.estado == 'Pendiente'} ? 'badge bg-warning text-dark' : 'badge bg-danger')">
                                            </span>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(reservasDTO)}" id="sinReservas">
                                        <td colspan="9" class="text-center text-muted py-3">Sin reservas registradas.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script>
function filtrarReservas() {
    const clienteId = document.getElementById('filtroCliente').value;
    let hayFilas = false;
    document.querySelectorAll('#tablaReservasCliente tbody tr[data-cliente-id]').forEach(fila => {
        const visible = !clienteId || fila.dataset.clienteId === clienteId;
        fila.style.display = visible ? '' : 'none';
        if (visible) hayFilas = true;
    });
    const sinReservas = document.getElementById('sinReservas');
    if (sinReservas) sinReservas.style.display = hayFilas ? 'none' : '';
}
</script>
</body>
</html>
