<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas - Admin</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/amsuno.css}">
</head>
<body>
<div class="admin-wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar(activo='reservas')}"></div>

    <div class="admin-content">
        <div class="admin-topbar">
            <div>
                <div class="admin-topbar-title">Gestión de Reservas</div>
                <div class="admin-topbar-sub">Cine La Estación</div>
            </div>
            <a href="/" class="btn-ver-sitio">Ver Sitio</a>
        </div>

        <div class="admin-main">
            <div class="row g-4">

                <!-- FORMULARIO NUEVA RESERVA -->
                <div class="col-lg-4">
                    <div class="admin-card p-4">
                        <h6 class="fw-bold mb-3">Nueva Reserva</h6>
                        <form th:action="@{/admin/reservas/nueva}" th:object="${reserva}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Cliente</label>
                                <input type="text" th:field="*{clienteNombre}" class="form-control" placeholder="Nombre del cliente" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Película</label>
                                <select th:field="*{pelicula}" class="form-select">
                                    <option th:each="p : ${peliculas}" th:value="${p.titulo}" th:text="${p.titulo}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Fecha</label>
                                <input type="text" th:field="*{fecha}" class="form-control" placeholder="2026-04-18 19:00">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Asientos</label>
                                <input type="number" th:field="*{asientos}" class="form-control" min="1" value="1">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Total (₦)</label>
                                <input type="number" th:field="*{total}" class="form-control" placeholder="2500">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Estado</label>
                                <select th:field="*{estado}" class="form-select">
                                    <option value="Pendiente">Pendiente</option>
                                    <option value="Confirmada">Confirmada</option>
                                    <option value="Cancelada">Cancelada</option>
                                </select>
                            </div>
                            <button type="submit" class="btn-admin-primary w-100">+ Guardar Reserva</button>
                        </form>
                    </div>
                </div>

                <!-- LISTADO DE RESERVAS -->
                <div class="col-lg-8">
                    <div class="admin-card">
                        <div class="admin-card-header">
                            <div class="admin-card-title">Todas las Reservas</div>
                        </div>

                        <!-- BÚSQUEDA Y FILTRO -->
                        <div class="px-4 pt-3 pb-2">
                            <form action="/admin/reservas" method="get" class="d-flex gap-2">
                                <input type="text" name="buscar" class="form-control"
                                       placeholder="Buscar cliente, película o ID..."
                                       th:value="${buscar}">
                                <select name="estado" class="form-select" style="width:160px;" onchange="this.form.submit()">
                                    <option value="Todos"      th:selected="${estadoFiltro == 'Todos'}">Todos</option>
                                    <option value="Confirmada" th:selected="${estadoFiltro == 'Confirmada'}">Confirmada</option>
                                    <option value="Pendiente"  th:selected="${estadoFiltro == 'Pendiente'}">Pendiente</option>
                                    <option value="Cancelada"  th:selected="${estadoFiltro == 'Cancelada'}">Cancelada</option>
                                </select>
                            </form>
                        </div>

                        <div class="table-responsive px-2 pb-2">
                            <table class="admin-table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Cliente</th>
                                        <th>Película</th>
                                        <th>Fecha</th>
                                        <th>Asientos</th>
                                        <th>Total</th>
                                        <th>Estado</th>
                                        <th>Acciones</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="r : ${reservas}">
                                        <td th:text="${r.id}"></td>
                                        <td th:text="${r.clienteNombre}"></td>
                                        <td th:text="${r.pelicula}"></td>
                                        <td th:text="${r.fecha}"></td>
                                        <td th:text="${r.asientos}"></td>
                                        <td>₦<span th:text="${r.total}"></span></td>
                                        <td>
                                            <span class="estado-badge"
                                                  th:text="${r.estado}"
                                                  th:class="${r.estado == 'Confirmada'} ? 'estado-badge badge-confirmado' : (${r.estado == 'Pendiente'} ? 'estado-badge badge-pendiente' : 'estado-badge badge-cancelado')">
                                            </span>
                                        </td>
                                        <td>
                                            <a th:if="${r.estado == 'Pendiente'}"
                                               th:href="@{/admin/reservas/confirmar/{id}(id=${r.id})}"
                                               class="btn btn-sm btn-outline-success">Confirmar</a>
                                            <a th:href="@{/admin/reservas/eliminar/{id}(id=${r.id})}"
                                               class="btn btn-sm btn-outline-danger"
                                               onclick="return confirm('¿Eliminar?')">Eliminar</a>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(reservas)}">
                                        <td colspan="8" class="text-center text-muted py-3">Sin reservas.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
