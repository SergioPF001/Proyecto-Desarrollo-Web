<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="sidebar(activo)">
    <div class="admin-sidebar">
        <div class="admin-logo">
            <span class="admin-logo-icon">⊞</span>
            <div class="admin-logo-text">
                Cine La Estación
                <span>Panel Admin</span>
            </div>
        </div>
        <nav class="admin-nav">
            <a href="/admin/dashboard" th:class="${activo == 'dashboard'} ? 'admin-nav-item activo' : 'admin-nav-item'">
                <span class="admin-nav-icon">⊞</span> Dashboard
            </a>
            <a href="/admin/reservas" th:class="${activo == 'reservas'} ? 'admin-nav-item activo' : 'admin-nav-item'">
                <span class="admin-nav-icon">◈</span> Reservas
            </a>
            <a href="/admin/peliculas" th:class="${activo == 'peliculas'} ? 'admin-nav-item activo' : 'admin-nav-item'">
                <span class="admin-nav-icon">🎬</span> Películas
            </a>
            <a href="/admin/clientes" th:class="${activo == 'clientes'} ? 'admin-nav-item activo' : 'admin-nav-item'">
                <span class="admin-nav-icon">👥</span> Clientes
            </a>
            <a href="/admin/snacks" th:class="${activo == 'snacks'} ? 'admin-nav-item activo' : 'admin-nav-item'">
                <span class="admin-nav-icon">⬡</span> Snacks
            </a>
            <a href="/admin/estadisticas" th:class="${activo == 'estadisticas'} ? 'admin-nav-item activo' : 'admin-nav-item'">
                <span class="admin-nav-icon">📊</span> Estadísticas
            </a>
            <a href="/admin/graficos" th:class="${activo == 'graficos'} ? 'admin-nav-item activo' : 'admin-nav-item'">
                <span class="admin-nav-icon">📈</span> Gráficos
            </a>
            <a href="/admin/configuracion" th:class="${activo == 'configuracion'} ? 'admin-nav-item activo' : 'admin-nav-item'">
                <span class="admin-nav-icon">⚙</span> Configuración
            </a>
        </nav>
        <div class="admin-sidebar-footer">
            <div class="admin-user">
                <div class="admin-user-avatar">A</div>
                <div>
                    <div class="admin-user-name">Administrador</div>
                    <div class="admin-user-role">admin_cine</div>
                </div>
            </div>
            <a href="/admin/cerrar-sesion" class="admin-logout">↩ Cerrar Sesión</a>
        </div>
    </div>
</div>
</body>
</html>
