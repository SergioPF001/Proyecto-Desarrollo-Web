<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar - Cine La Estación</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-body">
<div class="d-flex align-items-center justify-content-center" style="min-height:100vh;padding:20px;">
    <div class="login-card">
        <div class="login-icon">⊞</div>
        <h1 class="login-title">Panel de Administración</h1>
        <p class="login-sub">Cine La Estación - Acceso Administrativo</p>

        <div th:if="${error}" class="alert alert-danger py-2 mb-3 small" th:text="${error}"></div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold small">Usuario</label>
                <input type="text" name="usuario" class="form-control" placeholder="Ingrese su usuario" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold small">Contraseña</label>
                <input type="password" name="contrasena" class="form-control" placeholder="Ingrese su contraseña" required>
            </div>
            <button type="submit" class="btn-primary-cinema mb-2">Ingresar al Panel</button>
        </form>
        <a href="/" class="btn-login-outline">Volver al Sitio</a>

        <div class="login-credentials">
            <strong>Credenciales de acceso:</strong>
            <span><strong>Administrador</strong> — Usuario: <code>admin_cine</code> / Contraseña: <code>LaEstacion2026!</code></span>
            <span><strong>Cajero</strong> — Usuario: <code>cajero_cine</code> / Contraseña: <code>Cajero2026!</code></span>
        </div>
    </div>
</div>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
